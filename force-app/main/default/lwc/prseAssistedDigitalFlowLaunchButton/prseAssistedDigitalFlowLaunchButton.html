<template>
    <lightning-card>
        <div class="slds-p-around_small slds-grid slds-grid_align-end">
            <lightning-button 
                label="Create new exemption"
                title="Create new exemption"
                variant="neutral"
                onclick={handleClick}>
            </lightning-button>
        </div>

        <template if:true={showFlow}>
            <section role="dialog" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container slds-modal_x-large"  style="min-width: 95vw; max-width: 90vw;">
                    <header class="slds-modal__header">
                        <h2 class="slds-text-heading_medium">Exemption creation</h2>
                    </header>

                    <div class="slds-modal__content slds-p-around_medium"  style="height: 100%;">
                        <lightning-flow
                            flow-api-name="PRSE_Assisted_Digital_Create_Exemption"
                            onstatuschange={handleStatusChange}
                            style="width: 100%; height: 100%;">
                        </lightning-flow>
                    </div>

                    <footer class="slds-modal__footer">
                        <lightning-button label="Close" onclick={closeModal}></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
    </lightning-card>
</template>
