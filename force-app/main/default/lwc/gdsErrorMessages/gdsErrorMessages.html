<template>
    <c-prse-theme-c-s-s-provider></c-prse-theme-c-s-s-provider>
    <div class="govuk-width-container ">
        <template if:true={hasErrors}>
            <div
                class="govuk-error-summary error-summary"
                aria-labelledby="error-summary-title"
                role="alert"
                tabindex="-1" 
                data-module="govuk-error-summary"
                id="errorSummaryTitle"
            >
                <h2 class="govuk-error-summary__title" id="error-summary-title">
                    {errorPrefix}
                </h2>
                <div class="govuk-error-summary__body">
                    <ul class="govuk-list govuk-error-summary__list">
                        <template for:each={components} for:item="component">
                            <li key={component.id}>
                                <a href="#" 
                                    onclick={handleClick} 
                                    onfocus={handleLinkFocus} 
                                    onblur={handleLinkBlur} 
                                    class={highlightedLinkClass} 
                                    data-target-id={component.focusId} 
                                    if:false={component.isValid} 
                                    aria-label={component.error}
                                >{component.error}</a>
                            </li>
                        </template>
                    </ul>
                </div>
            </div>
        </template>
    </div>
</template>
