<template>
    <div class="govuk-grid-row">
        <div class="govuk-grid-column-two-thirds">
            <template if:true={landlord}>
                <h2 class="govuk-heading-m govuk-!-margin-top-4">Landlord details</h2>
                <dl class="govuk-summary-list">
                    <div class="govuk-summary-list__row">
                        <dt class="govuk-summary-list__key">First name</dt>
                        <dd class="govuk-summary-list__value">{landlord.LandlordFirstName}</dd>
                    </div>
                    <div class="govuk-summary-list__row">
                        <dt class="govuk-summary-list__key">Last name</dt>
                        <dd class="govuk-summary-list__value">{landlord.LandlordLastName}</dd>
                    </div>
                    <template if:true={showBusinessName}>               
                        <div class="govuk-summary-list__row">
                            <dt class="govuk-summary-list__key">Organisation name</dt>
                            <dd class="govuk-summary-list__value">{landlord.LandlordBusinessName}</dd>
                        </div>
                    </template>
                    <div class="govuk-summary-list__row">
                        <dt class="govuk-summary-list__key">Correspondence address</dt>
                        <dd class="govuk-summary-list__value">{landlord.LandlordAddress}</dd>
                    </div>
                    <div class="govuk-summary-list__row">
                        <dt class="govuk-summary-list__key">Telephone number</dt>
                        <dd class="govuk-summary-list__value">{landlord.LandlordPhone}</dd>
                    </div>
                    <div class="govuk-summary-list__row">
                        <dt class="govuk-summary-list__key">Email address</dt>
                        <dd class="govuk-summary-list__value">{landlord.LandlordEmail}</dd>
                    </div>
                </dl>
                <template if:true={digitallyAssistedRoute}>                    
                    <h2 class="govuk-heading-m govuk-!-margin-top-4">Digital support</h2>
                    <div class="govuk-inset-text">This exemption has been registered through the digital support route because the {partyType} was unable to register it online. This may be because they do not feel confident using online services, or something went wrong with the service. The {partyType} will email or post their evidence to DESNZ staff, who will add it to this exemption record.</div>
                    <dl class="govuk-summary-list">
                        <div class="govuk-summary-list__row">
                            <dt class="govuk-summary-list__key">Reason for using digital support</dt>
                            <dd class="govuk-summary-list__value">{landlord.ReasonForCallingADRoute}</dd>
                        </div>
                        <div class="govuk-summary-list__row">
                            <dt class="govuk-summary-list__key">Evidence supplied</dt>
                            <dd class="govuk-summary-list__value">By post</dd>
                        </div>
                    </dl>
                </template>
            </template>
            <template if:false={landlord}>
                <p>Loading landlord details…</p>
            </template>
        </div>
    </div>
</template>
