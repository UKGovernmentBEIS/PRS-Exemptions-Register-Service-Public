<template>
    <div class="govuk-grid-row">
        <div class="govuk-grid-column-two-thirds">
            <h2 class="govuk-heading-m govuk-!-margin-top-4">Agent details</h2>
            <template if:true={hasAgent}>
                <dl class="govuk-summary-list">
                    <div class="govuk-summary-list__row">
                        <dt class="govuk-summary-list__key">First name</dt>
                        <dd class="govuk-summary-list__value">{agent.FirstName}</dd>
                    </div>
                    <div class="govuk-summary-list__row">
                        <dt class="govuk-summary-list__key">Last name</dt>
                        <dd class="govuk-summary-list__value">{agent.LastName}</dd>
                    </div>
                    <div class="govuk-summary-list__row">
                        <dt class="govuk-summary-list__key">Company name</dt>
                        <dd class="govuk-summary-list__value">{agent.BusinessName}</dd>
                    </div>
                    <div class="govuk-summary-list__row">
                        <dt class="govuk-summary-list__key">Correspondence address</dt>
                        <dd class="govuk-summary-list__value">
                            {agent.Address}
                        </dd>
                    </div>
                    <div class="govuk-summary-list__row">
                        <dt class="govuk-summary-list__key">Telephone number</dt>
                        <dd class="govuk-summary-list__value">{agent.Phone}</dd>
                    </div>
                    <div class="govuk-summary-list__row">
                        <dt class="govuk-summary-list__key">Email address</dt>
                        <dd class="govuk-summary-list__value">{agent.Email}</dd>
                    </div>
                </dl>
                <template if:true={digitallyAssistedRoute}>                    
                    <h2 class="govuk-heading-m govuk-!-margin-top-4">Digital support</h2>
                    <div class="govuk-inset-text">The agent has registered this exemption through the digital support route</div>
                    <dl class="govuk-summary-list">
                        <div class="govuk-summary-list__row">
                            <dt class="govuk-summary-list__key">Reason for using digital support</dt>
                            <dd class="govuk-summary-list__value">{agent.ReasonForCallingADRoute}</dd>
                        </div>
                        <div class="govuk-summary-list__row">
                            <dt class="govuk-summary-list__key">Evidence supplied</dt>
                            <dd class="govuk-summary-list__value">By post</dd>
                        </div>
                    </dl>
                </template>
            </template>
            <template if:false={hasAgent}>
                <p>No agent details available.</p>
            </template>
        </div>
    </div>
</template>
