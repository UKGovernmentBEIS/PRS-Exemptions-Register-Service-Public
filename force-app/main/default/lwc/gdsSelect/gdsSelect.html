<template>
    <c-prse-theme-c-s-s-provider></c-prse-theme-c-s-s-provider>
    <div class="govuk-width-container ">
        <div class={groupClass}>
            
            <h1 class="govuk-label-wrapper" if:true={h1Size}>
                <span class="govuk-caption-l">{caption}</span>
                <label class={labelClass} for={fieldId}>
                    <template if:false={hasHtmlLabel}>
                        {label}
                    </template>
                    <template if:true={hasHtmlLabel}>
                        <span class="label-with-html"></span>
                    </template>
                </label>
            </h1>
            <h2 class="govuk-label-wrapper" if:true={h2Size}>
                <span class="govuk-caption-s">{caption}</span>
                <label class={labelClass} for={fieldId}>
                    <template if:false={hasHtmlLabel}>
                        {label}
                    </template>
                    <template if:true={hasHtmlLabel}>
                        <span class="label-with-html"></span>
                    </template>
                </label>
            </h2>
            <h3 class="govuk-label-wrapper" if:true={h3Size}>
                <span class="govuk-caption-s">{caption}</span>
                <label class={labelClass} for={fieldId}>
                    <template if:false={hasHtmlLabel}>
                        {label}
                    </template>
                    <template if:true={hasHtmlLabel}>
                        <span class="label-with-html"></span>
                    </template>
                </label>
            </h3>
           
            <template if:true={hasErrors}>
                <span class="govuk-error-message">
                    <span class="govuk-visually-hidden">Error:</span>&nbsp;{errorMessage}
                </span>
            </template>
            
            <div id="hint-text" class="govuk-body slds-hyphenate" if:true={hintText}>
                <template if:false={hasHtmlHint}>
                    {hintText}
                </template>
                <template if:true={hasHtmlHint}>
                    <span class="hint-with-html"></span>
                </template>
            </div>
            
            <select class="govuk-select"
                    id={fieldId}
                    name={fieldId}
                    onchange={handleOnChange}>
                <template for:each={selectOptions} for:item="option">
                    <option key={option.key}
                            value={option.value}
                            selected={option.selected}>{option.label}</option>
                </template>
            </select>
        </div>
    </div>
</template>
