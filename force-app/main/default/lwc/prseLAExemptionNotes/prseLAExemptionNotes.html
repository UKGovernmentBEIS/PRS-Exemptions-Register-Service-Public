<template>
    <div class="govuk-grid-row">
        <div class="govuk-grid-column-two-thirds">
            <div class="govuk-form-group">
                <h2 class="govuk-heading-m">
                    <label class="govuk-label govuk-label--m govuk-!-margin-top-4" for="notes">
                        Notes
                    </label>
                    <p class="govuk-hint">This space is for you to make notes about the work you have done on the exemption. Notes are not visible to landlords</p>
                </h2>

                <!-- Editable textarea -->
                <template if:true={isEditing}>
                    <textarea 
                        id="notes"
                        class="govuk-textarea" 
                        rows="8"
                        onkeyup={handleKeyUp}
                    >
                        {editableNotes}
                    </textarea>
                    <p class="govuk-hint" style={remainingCharsStyle}>{remainingChars} characters remaining.</p>
                    <button class="govuk-button" type="button" onclick={handleSaveClick}  disabled={isOverLimit}>
                        Save changes
                    </button>
                </template>

                <!-- Read-only display -->
                <template if:false={isEditing}>
                    <template if:true={hasNotes}>
                        <div class="govuk-body" style="white-space: pre-line; word-break: break-word;">{notes}</div>
                    </template>
                    <template if:false={hasNotes}>
                        <div class="govuk-inset-text">No notes currently added</div>
                    </template>

                    <button class="govuk-button" type="button" onclick={handleEditClick}>
                        {editButtonLabel}
                    </button>
                </template>
            </div>
        </div>
    </div>
</template>
