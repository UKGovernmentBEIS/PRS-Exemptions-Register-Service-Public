<template>
    <c-prse-theme-c-s-s-provider></c-prse-theme-c-s-s-provider>
    <div class="govuk-width-container ">
        <div class={groupClass}>
            <fieldset class="govuk-fieldset" aria-describedby="waste-hint">
                <legend class="govuk-fieldset__legend govuk-fieldset__legend--l">
                    <h1 class="govuk-label-wrapper" if:true={h1Size}>
                        <label class={headingLabelClass} for="input-text">{headinglabel}</label>
                    </h1>
                    <h2 class="govuk-label-wrapper" if:true={h2Size}>
                        <label class={headingLabelClass} for="input-text">{headinglabel}</label>
                    </h2>
                    <h3 class="govuk-label-wrapper" if:true={h3Size}>
                        <label class={headingLabelClass} for="input-text">{headinglabel}</label>
                    </h3>
                </legend>
                <div id="hint1" class="govuk-hint">
                    {headinghint}
                </div>
                <div id="hint2" class="govuk-hint">
                    {headinghint2}
                </div>
                <div class={checkboxClass}>
                    <span class="govuk-error-message" if:true={hasErrors}>
                        <span class="govuk-visually-hidden">Error:</span>&nbsp;{errorMessage}
                    </span>
                    <template for:each={checkboxArray} for:item="opt" for:index="index">
                        <div class="govuk-checkboxes__item" key={opt.checkboxLabel} style="margin-bottom: 30px;">
                            <input
                                class="govuk-checkboxes__input"
                                data-index={index}
                                data-id={opt.checkboxLabel}
                                name={opt.checkboxLabel}
                                value={opt.checkboxLabel}
                                type="checkbox"
                                checked={opt.checkboxValue}
                                onclick={handleClick}
                                aria-label={opt.checkboxLabel}>
                            <label class="govuk-label govuk-checkboxes__label" for={opt.checkboxLabel}>
                                {opt.checkboxLabel}
                            </label>
                            <div class="govuk-hint govuk-checkboxes__hint" if:true={opt.checkboxHint}>
                                {opt.checkboxHint}
                            </div>
                        </div>
                    </template>
                </div>
            </fieldset>
        </div>
    </div>
</template>
